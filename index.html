<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程表</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: #0a0a0a;
            padding: 20px;
            color: #e0e0e0;
            overflow-x: hidden;
            position: relative;
        }
        
        /* 3D粒子星星背景样式 */
        :root {
            --star-min-size: 1px;
            --star-max-size: 5px;
            --star-min-opacity: 0.3;
            --star-max-opacity: 1.0;
            --star-min-duration: 5s;
            --star-max-duration: 20s;
            --star-z-index: -1;
        }
        
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: var(--star-z-index);
            pointer-events: none;
            perspective: 1200px;
            overflow: hidden;
            transform-style: preserve-3d;
        }
        

        
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            transform-style: preserve-3d;
            transition: transform 0.05s ease-out;
        }
        
        /* 镜头摇晃动画 */
        @keyframes cameraShake {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            10% {
                transform: translate(-0.5px, 0.5px) rotate(0.15deg);
            }
            20% {
                transform: translate(-0.25px, 0.25px) rotate(0.05deg);
            }
            30% {
                transform: translate(0.5px, -0.5px) rotate(-0.15deg);
            }
            40% {
                transform: translate(0.25px, -0.25px) rotate(-0.05deg);
            }
            50% {
                transform: translate(-0.5px, -0.5px) rotate(0.15deg);
            }
            60% {
                transform: translate(-0.25px, -0.25px) rotate(0.05deg);
            }
            70% {
                transform: translate(0.5px, 0.5px) rotate(-0.15deg);
            }
            80% {
                transform: translate(0.25px, 0.25px) rotate(-0.05deg);
            }
            90% {
                transform: translate(-0.25px, 0.25px) rotate(0.1deg);
            }
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }
        
        .stars-container {
            animation: cameraShake 25s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
            animation: containerFadeIn 0.8s ease-out;
        }
        
        /* 移动端整合布局 */
        @media screen and (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            /* 日期导航布局 */
            .date-nav {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 16px;
                margin-bottom: 16px;
                gap: 10px;
            }
            
            .date-nav .date-info {
                text-align: center;
                margin: 8px 0;
            }
            
            .date-nav .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 10px;
        }
            
            /* 星期和课程整合 */
            .weekday {
                margin-bottom: 16px;
                text-align: center;
            }
            
            .course-item {
                margin-bottom: 16px;
                border-radius: 8px;
                overflow: hidden;
            }
        }
        
        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .date-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
            padding: 20px;
            border-radius: 10px;
            min-height: 130px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .date-nav button {
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
            min-height: 50px;
            transition: transform 0.15s ease;
            font-weight: 500;
            font-size: 14px;
            position: relative;
            overflow: hidden;
        }
        
        .date-nav .date-info {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px;
            border-radius: 8px;
        }
        
        .date-nav .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 10px;
        }
        
        .date-nav .current-time {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            position: relative;
            display: inline-block;
            margin: 0 auto;
            transition: transform 0.15s ease;
        }
        
        .date-nav .current-date-week {
            font-size: 15px;
            color: #b0b0b0;
            margin-top: 8px;
            cursor: pointer;
            position: relative;
            display: inline-block;
            margin: 8px auto 0;
            transition: transform 0.15s ease;
        }
        
        .weekday {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            cursor: pointer;
            color: #ffffff;
            position: relative;
            padding: 12px;
            border-radius: 8px;
            background-color: rgba(30, 30, 30, 0.1);
            backdrop-filter: blur(2px);
            transition: transform 0.15s ease;
        }
        
        .course-list {
            margin-top: 24px;
        }
        
        .course-item {
            display: flex;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 18px;
            background-color: rgba(30, 30, 30, 0.1);
            backdrop-filter: blur(2px);
            min-height: 130px;
            position: relative;
            overflow: hidden;
            animation: courseItemFadeIn 0.4s ease-out forwards;
        }
        
        .course-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, #3498db, #2980b9);
            opacity: 0;
        }
        
        .course-item.active::before {
            opacity: 1;
            background: linear-gradient(to bottom, #3498db, #9b59b6, #e74c3c, #f39c12);
            animation: borderGradient 2s ease-in-out infinite;
        }
        
        .course-item.active::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(52, 152, 219, 0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 2s ease-in-out infinite;
        }
        
        .course-item.active {
            border-color: #3498db;
            box-shadow: 0 8px 24px rgba(52, 152, 219, 0.35), 0 0 30px rgba(155, 89, 182, 0.2);
            transform: translateY(-3px) scale(1.01);
        }
        
        @keyframes courseItemFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        @keyframes borderGradient {
            0% {
                background: linear-gradient(to bottom, #3498db, #9b59b6, #e74c3c, #f39c12);
            }
            25% {
                background: linear-gradient(to bottom, #f39c12, #3498db, #9b59b6, #e74c3c);
            }
            50% {
                background: linear-gradient(to bottom, #e74c3c, #f39c12, #3498db, #9b59b6);
            }
            75% {
                background: linear-gradient(to bottom, #9b59b6, #e74c3c, #f39c12, #3498db);
            }
            100% {
                background: linear-gradient(to bottom, #3498db, #9b59b6, #e74c3c, #f39c12);
            }
        }
        
        @keyframes shimmer {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
                opacity: 0;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
                opacity: 0;
            }
        }
        
        .course-time {
            width: 170px;
            padding: 20px;
            border-right: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
            background-color: rgba(35, 35, 35, 0.1);
            backdrop-filter: blur(2px);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #ffffff;
        }
        
        .course-info {
            flex: 1;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .course-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #ffffff;
        }
        
        .course-detail {
            font-size: 14px;
            color: #b0b0b0;
            line-height: 1.4;
            margin-top: 0;
        }
        
        .course-detail br {
            line-height: 1.4;
        }
        
        .no-course {
            text-align: center;
            font-size: 22px;
            color: #999;
            padding: 80px 20px;
            background-color: rgba(30, 30, 30, 0.1);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -60%) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(52, 152, 219, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(52, 152, 219, 0);
            }
        }
        
        /* 媒体查询 - 移动端适配 */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
                font-size: 14px;
            }
            
            .container {
                padding: 16px;
            }
            
            /* 日期导航和内容整合 */
            .date-nav {
                flex-direction: column;
                padding: 16px;
                min-height: auto;
                gap: 12px;
                margin-bottom: 16px;
            }
            
            .date-nav button {
                min-width: 80px;
                min-height: 44px;
                padding: 8px 16px;
                font-size: 14px;
            }
            
            .date-nav .date-info {
                margin: 10px 0;
                text-align: center;
            }
            
            .date-nav .current-time {
                font-size: 16px;
                line-height: 1.4;
            }
            
            .date-nav .current-date-week {
                font-size: 14px;
                margin-top: 8px;
            }
            
            /* 星期显示 */
            .weekday {
                font-size: 18px;
                padding: 10px;
                margin-bottom: 16px;
                text-align: center;
            }
            
            /* 课程项布局调整 */
            .course-item {
                flex-direction: row;
                min-height: auto;
                border-radius: 8px;
                overflow: hidden;
            }
            
            .course-time {
                width: 100px;
                border-right: 1px solid rgba(255,255,255,0.1);
                border-bottom: none;
                padding: 12px;
                font-size: 12px;
                text-align: center;
            }
            
            .course-info {
                flex: 1;
                padding: 12px;
            }
            
            .course-name {
                font-size: 15px;
                margin-bottom: 8px;
            }
            
            .course-detail {
                font-size: 13px;
                line-height: 1.5;
            }
            
            .no-course {
                font-size: 16px;
                padding: 40px 12px;
            }
            
            /* 模态框适配 */
            #dateModal > div,
            #weekModal > div {
                min-width: 90%;
                max-width: 90%;
                padding: 16px;
                box-sizing: border-box;
            }
            
            /* 日历适配 */
            #calendar {
                width: 100%;
                overflow-x: auto;
            }
            
            #calendar .nav {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            #calendar .weekRow {
                grid-template-columns: repeat(7, 1fr);
                gap: 4px;
            }
            
            #calendar .daysGrid {
                grid-template-columns: repeat(7, 1fr);
                gap: 4px;
                height: 220px;
                min-height: 220px;
            }
            
            /* 日期单元格适配 */
            #calendar .daysGrid > div {
                font-size: 12px;
                min-height: 30px;
            }
            
            /* 周数选择器适配 */
            #weekSelector {
                max-height: 300px;
                overflow-y: auto;
            }
            
            #weekSelector .weeks-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media screen and (max-width: 480px) {
            body {
                padding: 5px;
            }
            
            .container {
                padding: 12px;
            }
            
            .date-nav button {
                min-width: 100px;
                min-height: 44px;
                padding: 8px 16px;
                font-size: 14px;
            }
            
            .date-nav .current-time {
                font-size: 16px;
            }
            
            .weekday {
                font-size: 18px;
            }
            
            .course-time {
                padding: 12px;
            }
            
            .course-info {
                padding: 12px;
            }
            
            .course-name {
                font-size: 15px;
            }
            
            .no-course {
                font-size: 16px;
                padding: 40px 12px;
            }
        }
        
        /* 横屏适配 */
        @media screen and (orientation: landscape) and (max-height: 500px) {
            .date-nav {
                flex-direction: row;
                min-height: 100px;
            }
            
            .course-item {
                flex-direction: row;
            }
            
            .course-time {
                width: 120px;
                border-right: 1px solid rgba(255,255,255,0.1);
                border-bottom: none;
            }
        }
        
        /* 触摸设备优化 */
        @media (hover: none) and (pointer: coarse) {
            .date-nav button,
            .course-item,
            .weekday,
            #cancelDate,
            #confirmDate,
            #cancelWeek,
            #confirmWeek {
                touch-action: manipulation;
            }
            
            /* 增大触摸区域 */
            .date-nav button,
            #cancelDate,
            #confirmDate,
            #cancelWeek,
            #confirmWeek {
                min-height: 48px;
                min-width: 80px;
            }
        }
        
        /* 模态框按钮样式 */
        #cancelDate, #cancelWeek {
            padding: 12px 20px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.15s ease;
            position: relative;
            overflow: hidden;
            min-height: 44px;
            min-width: 80px;
            font-size: 14px;
        }
        
        #confirmDate, #confirmWeek {
            padding: 12px 20px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.15s ease;
            position: relative;
            overflow: hidden;
            min-height: 44px;
            min-width: 80px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars-container" id="starsContainer"></div>
    <div class="container">
        <div class="date-nav">
            <div class="date-info">
                <div class="current-time" id="currentTime" style="cursor: pointer;">点击刷新</div>
                <div class="current-date-week" id="currentDateWeek" style="cursor: pointer;">点击选择日期</div>
            </div>
            <div class="button-container">
                <button id="prevDay">昨天</button>
                <button id="nextDay">明天</button>
            </div>
        </div>
        <div class="weekday" id="weekday"></div>
        <div class="course-list" id="courseList"></div>
    </div>
    
    <!-- 日期选择器模态框 -->
    <div id="dateModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(8px); transition: all 0.3s ease;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); min-width: 320px; animation: modalFadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.1);">
            <h3 style="margin-bottom: 20px; text-align: center; color: #ffffff; font-weight: 600;">选择日期</h3>
            <div id="calendar" style="margin-bottom: 20px;"></div>
            <div style="display: flex; justify-content: space-between;">
                <button id="cancelDate">取消</button>
                <button id="confirmDate">确认</button>
            </div>
        </div>
    </div>
    
    <!-- 周数选择器模态框 -->
    <div id="weekModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(8px); transition: all 0.3s ease;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); min-width: 320px; animation: modalFadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.1);">
            <h3 style="margin-bottom: 20px; text-align: center; color: #ffffff; font-weight: 600;">选择周数</h3>
            <div id="weekSelector" style="margin-bottom: 20px;"></div>
            <div style="display: flex; justify-content: space-between;">
                <button id="cancelWeek">取消</button>
                <button id="confirmWeek">确认</button>
            </div>
        </div>
    </div>
    
    <script>
        // 3D粒子星星背景实现 - 基于2D技术模拟3D景深效果
        class StarryBackground {
            constructor() {
                this.container = document.getElementById('starsContainer');
                this.stars = [];
                this.starCount = 150; // 创建150个星星粒子
                this.specialStarCount = 13; // 13个特殊亮星
                this.isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                this.lastTime = 0;
                this.frameCount = 0;
                this.optimized = false;
                // 特殊亮星的锚定位置（模拟红点位置）
                this.specialStarPositions = [
                    {x: 15, y: 10}, {x: 25, y: 20}, {x: 30, y: 15}, 
                    {x: 70, y: 10}, {x: 75, y: 20}, {x: 65, y: 25}, 
                    {x: 20, y: 80}, {x: 30, y: 75}, {x: 25, y: 85}, 
                    {x: 70, y: 80}, {x: 80, y: 75}, {x: 75, y: 85}, 
                    {x: 50, y: 50}
                ];
                this.specialStarIndex = 0;
                // 摄像头旋转参数
                this.cameraRotationX = 0;
                this.cameraRotationY = 0;
                this.cameraRotationSpeedX = 0.000;
                this.cameraRotationSpeedY = 0.002;
                // 后续旋转状态
                this.followUpRotation = false; // 是否开始后续旋转
                this.targetRotation = 0; // 目标旋转角度
                this.baseRotation = 0; // 基准旋转角度（360度旋转结束后的位置）
                this.startRotation = 0; // 每次旋转的起始角度
                this.rotationDirection = 1; // 旋转方向：1为正方向，-1为负方向
                this.rotationDuration = 20000; // 旋转持续时间（毫秒）
                this.rotationStartTime = 0; // 旋转开始时间
                this.minRotationSpeed = 0.002; // 最小旋转速度（弧度/帧）
                this.lastRotationTime = null; // 上一次旋转时间
                this.currentRotationSpeed = 0; // 当前旋转速度
                
                // 性能检测
                this.detectPerformance();
                this.init();
            }
            
            detectPerformance() {
                // 检测设备性能，但保持星星数量一致
                const isLowEndDevice = this.isMobile || navigator.userAgent.includes('Windows NT 6.1');
                if (isLowEndDevice) {
                    this.optimized = true;
                }
            }
            
            init() {
                this.createStars();
                this.startAnimation();
                this.setupEventListeners();
                this.initCameraRotation();
            }
            
            initCameraRotation() {
                // 初始化摄像头旋转动画，1.5秒内旋转360度，带缓动效果
                const duration = 1500; // 1.5秒
                const startTime = performance.now();
                const targetRotation = Math.PI * 2; // 360度
                const minSpeed = 0.002; // 最小速度，不低于正常Y轴旋转速度
                
                // 计算最大速度，确保在指定时间内完成旋转
                const maxSpeed = (targetRotation / duration) * 16.67 * 2; // 假设60fps
                
                // 自定义缓动函数，确保速度不低于最小值，使用更明显的减速效果
                const customEase = (t) => {
                    // 先加速到最大速度，然后使用指数减速
                    if (t < 0.2) {
                        // 加速阶段（更短）
                        return (maxSpeed - minSpeed) * (t / 0.2) + minSpeed;
                    } else {
                        // 减速阶段（更长）- 使用指数减速
                        const normalizedT = (t - 0.2) / 0.8;
                        // 指数减速，后期减速更明显
                        const easedT = 1 - Math.pow(2, -10 * normalizedT);
                        return (maxSpeed - minSpeed) * (1 - easedT) + minSpeed;
                    }
                };
                
                let accumulatedRotation = 0;
                let lastTime = startTime;
                
                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const deltaTime = currentTime - lastTime;
                    const linearProgress = Math.min(elapsed / duration, 1);
                    
                    // 计算当前速度
                    const currentSpeed = customEase(linearProgress);
                    // 计算本次帧的旋转量
                    const rotationDelta = currentSpeed * (deltaTime / 16.67); // 假设60fps为基准
                    
                    // 应用旋转
                    accumulatedRotation += rotationDelta;
                    this.cameraRotationY = accumulatedRotation;
                    
                    // 记录当前旋转速度
                    this.currentRotationSpeed = currentSpeed;
                    
                    lastTime = currentTime;
                    
                    if (linearProgress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        // 360度旋转结束，开始后续旋转
                        this.startFollowUpRotation();
                    }
                };
                
                requestAnimationFrame(animate);
            }
            
            startFollowUpRotation() {
                // 开始后续旋转：30° → -30° → 30° 循环
                this.followUpRotation = true;
                // 记录360度旋转结束后的基准角度
                this.baseRotation = this.cameraRotationY;
                this.rotationDirection = 1;
                this.setNextTargetRotation();
            }
            
            setNextTargetRotation() {
                // 设置下一个目标旋转角度（绝对角度）
                if (this.rotationDirection === 1) {
                    this.targetRotation = this.baseRotation + 30 * Math.PI / 180; // 旋转到30度（弧度）
                } else {
                    this.targetRotation = this.baseRotation - 30 * Math.PI / 180; // 旋转到-30度（弧度）
                }
                this.rotationStartTime = performance.now();
                this.startRotation = this.cameraRotationY;
            }
            
            updateFollowUpRotation(currentTime) {
                // 更新后续旋转
                if (!this.followUpRotation) return;
                
                const elapsed = currentTime - this.rotationStartTime;
                const linearProgress = Math.min(elapsed / this.rotationDuration, 1);
                
                // 计算总旋转角度
                const totalRotation = this.targetRotation - this.startRotation;
                const rotationDirection = Math.sign(totalRotation);
                
                // 计算目标速度（基于总旋转角度和持续时间）
                const targetSpeed = Math.abs(totalRotation) / (this.rotationDuration / 16.67);
                
                // 使用更平滑的曲线速度过渡
                const speedProgress = this.easeInOutCubic(linearProgress);
                
                // 计算目标速度（带方向）
                const targetSpeedWithDirection = rotationDirection * targetSpeed;
                // 计算当前速度（带方向）
                const currentSpeedWithDirection = Math.sign(this.currentRotationSpeed) * this.currentRotationSpeed;
                
                // 平滑过渡速度（包括方向变化）
                const newSpeedWithDirection = currentSpeedWithDirection + (targetSpeedWithDirection - currentSpeedWithDirection) * speedProgress;
                const currentSpeed = Math.max(this.minRotationSpeed, Math.abs(newSpeedWithDirection));
                const currentDirection = Math.sign(newSpeedWithDirection);
                
                // 计算当前帧应该旋转的角度
                const deltaTime = currentTime - (this.lastRotationTime || this.rotationStartTime);
                const rotationDelta = currentDirection * currentSpeed * (deltaTime / 16.67);
                
                // 计算当前旋转角度
                let currentRotation = this.cameraRotationY + rotationDelta;
                
                // 检查是否到达目标角度
                if (rotationDirection > 0 && currentRotation >= this.targetRotation) {
                    currentRotation = this.targetRotation;
                } else if (rotationDirection < 0 && currentRotation <= this.targetRotation) {
                    currentRotation = this.targetRotation;
                }
                
                // 应用旋转
                this.cameraRotationY = currentRotation;
                this.lastRotationTime = currentTime;
                this.currentRotationSpeed = currentDirection * currentSpeed;
                
                if (Math.abs(this.cameraRotationY - this.targetRotation) < 0.01) {
                    // 旋转完成，切换方向
                    this.rotationDirection *= -1;
                    // 确保下一次旋转的目标是基于基准角度的绝对位置
                    this.setNextTargetRotation();
                    this.lastRotationTime = null;
                }
            }
            
            easeInOutSine(t) {
                // 正弦缓动函数，更加平滑的过渡
                return -(Math.cos(Math.PI * t) - 1) / 2;
            }
            
            easeInOutCubic(t) {
                // 三次方缓动函数，提供更平滑的曲线速度过渡
                return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }
            
            createStars() {
                // 分批次创建星星，避免一次性创建过多DOM节点
                let created = 0;
                const batchSize = 10;
                
                const createBatch = () => {
                    const end = Math.min(created + batchSize, this.starCount);
                    for (let i = created; i < end; i++) {
                        this.createStar();
                    }
                    created = end;
                    
                    if (created < this.starCount) {

                    }
                };
                
                createBatch();
            }

                    offsetSpeed: Math.random() * 0.01 + 0.005,

                    offsetPhaseY: Math.random() * Math.PI * 2,
                    // 取消星星飘荡，只保留Z轴移动
                    vx: 0,
                    vy: 0,
                    vz: (Math.random() - 0.5) * 0.01,
                    rotationX: 0,

                this.stars.push(starInfo);

            startAnimation() {

            animate(timestamp) {
                // 控制帧率，避免过度渲染
                if (timestamp - this.lastTime < 33) { // 约30fps
                    requestAnimationFrame((timestamp) => this.animate(timestamp));
                    return;
                }
                
                this.lastTime = timestamp;
                const time = timestamp * 0.001;
                
                // 更新摄像头旋转
                this.cameraRotationX += this.cameraRotationSpeedX;
                
                // 更新后续旋转
                this.updateFollowUpRotation(timestamp);
                
                // 优化：只更新可见区域的星星
                const visibleStars = this.getVisibleStars();
                
                visibleStars.forEach(star => {
                    // 3D位置更新
                    star.z += star.vz;
                    
                    // 边界检查和重置，确保所有星星在动画过程中不会超出屏幕可视区域
                    if (star.z < -500) star.z = 200;
                    if (star.z > 200) star.z = -500;
                    
                    // 特殊亮星的小幅度随机位移
                    if (star.isSpecial) {
                        // 更新位移相位
                        star.offsetPhaseX += star.offsetSpeed;
                        star.offsetPhaseY += star.offsetSpeed;
                        // 计算小幅度位移
                        const offsetX = Math.sin(star.offsetPhaseX) * 0.5;
                        const offsetY = Math.sin(star.offsetPhaseY) * 0.5;
                        // 保持在锚定位置附近
                        star.x = star.anchorX + offsetX;
                        star.y = star.anchorY + offsetY;
                    }
                    
                    // 星星闪烁效果
                    // z轴往后的星星闪烁更明显
                    const flickerIntensity = star.z < 0 ? Math.abs(star.z) / 500 : 0.1;
                    star.flickerPhase += star.flickerSpeed;
                    const flicker = Math.sin(star.flickerPhase) * 0.1 * flickerIntensity + 1;
                    
                    // 景深效果（基于Z轴位置），使星星呈现远近层次感
                    const scale = 1 + (star.z / 1000);
                    let opacity = star.baseOpacity;
                    // 特殊亮星始终保持高亮度
                    if (star.isSpecial) {
                        opacity = 1 * flicker;
                    } else {
                        opacity = star.baseOpacity * (0.3 + (star.z + 500) / 700) * flicker;
                    }
                    
                    // 根据z轴位置计算旋转系数，z轴越小（越远）旋转越小，最小为0.01
                    const rotationFactor = Math.max(0.01, (star.z + 500) / 700);
                    // 应用变换 - 包含摄像头旋转，并确保星星始终面向屏幕
                    star.element.style.transform = `translate(${star.x}%, ${star.y}%) rotateX(${this.cameraRotationX * rotationFactor * 180 / Math.PI}deg) rotateY(${this.cameraRotationY * rotationFactor * 180 / Math.PI}deg) translateZ(${star.z}px) rotateY(${-this.cameraRotationY * rotationFactor * 180 / Math.PI}deg) rotateX(${-this.cameraRotationX * rotationFactor * 180 / Math.PI}deg) scale(${scale})`;
                    star.element.style.opacity = opacity;
                    
                    // 根据深度调整泛光效果
                    const glowSize = star.size * 2 * scale;
                    star.element.style.boxShadow = `0 0 ${glowSize}px ${glowSize * 0.5}px ${star.color}`;
                });
                
                this.frameCount++;
                requestAnimationFrame((timestamp) => this.animate(timestamp));
            }

        // 计算周次
        function calculateWeekNumber(date) {
            // 确保日期是星期一为一周的开始
            const dayOfWeek = date.getDay();
            // 调整到本周的星期一
            const mondayOfWeek = new Date(date);
            mondayOfWeek.setDate(date.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
            
            // 计算与学期开始日期的天数差
            const timeDiff = mondayOfWeek.getTime() - semesterStart.getTime();
            const dayDiff = Math.ceil(timeDiff / (1000 * 3600 * 24));
            // 计算周次（从1开始）
            return Math.max(1, Math.ceil((dayDiff + 1) / 7));
        }
        
        // 检查课程是否在当前周
        function isCourseInCurrentWeek(course, weekNumber) {
            const weeks = course.weeks;
            // 解析周数范围
            const weekRanges = weeks.split(',');
            for (const range of weekRanges) {
                if (range.includes('-')) {
                    // 处理范围，如 "2-5周"
                    const [start, end] = range.replace('周', '').split('-').map(Number);
                    if (weekNumber >= start && weekNumber <= end) {
                        return true;
                    }
                } else {
                    // 处理单个周，如 "18周"
                    const week = parseInt(range.replace('周', ''));
                    if (weekNumber === week) {
                        return true;
                    }
                }
            }
            return false;
        }

                            courseList.appendChild(courseItem);
                        }
                    }
                });
            }
            
            // 如果没有课程，显示友好提示
            if (!hasCourses) {
                const noCourseElement = document.createElement('div');
                noCourseElement.className = 'no-course';
                noCourseElement.textContent = '今天没课，好好休息！';
                courseList.appendChild(noCourseElement);
            }
        }
        
        // 每1分钟更新一次课程状态
        setInterval(function() {
            // 更新currentDate为当前实时时间
            currentDate = new Date();
            // 更新日期显示和课程
            updateDateDisplay();
        }, 60000);
        
        // 事件监听 - 修复移动端点击可能触发两次点击事件的BUG
        function addTouchEvent(element, callback) {
            // 检测是否为触摸设备
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            
            if (isTouchDevice) {
                // 触摸设备只添加touchstart事件
                element.addEventListener('touchstart', function(e) {
                    // 添加触摸反馈动画
                    element.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        element.style.transform = 'scale(1)';
                    }, 150);
                    callback(e);
                });
            } else {
                // 非触摸设备添加click事件
                element.addEventListener('click', callback);
            }
        }
        
        addTouchEvent(document.getElementById('prevDay'), function() {
            currentDate.setDate(currentDate.getDate() - 1);
            updateDateDisplay();
        });
        
        addTouchEvent(document.getElementById('nextDay'), function() {
            currentDate.setDate(currentDate.getDate() + 1);
            updateDateDisplay();
        });
        
        // 点击实时时间滚动到日期位置
        addTouchEvent(document.getElementById('currentTime'), function() {
            // 添加触摸反馈动画
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 150);
            
            // 滚动到日期位置
            const dateElement = document.getElementById('currentDateWeek');
            if (dateElement) {
                dateElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });
        
        // 日历相关变量
        let selectedDate = new Date();
        let currentCalendarDate = new Date();
        
        // 生成日历
        function generateCalendar(date) {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            
            // 月份导航
            const nav = document.createElement('div');
            nav.style.display = 'flex';
            nav.style.justifyContent = 'space-between';
            nav.style.alignItems = 'center';
            nav.style.marginBottom = '15px';
            
            const prevBtn = document.createElement('button');
            prevBtn.textContent = '‹';
            prevBtn.style.padding = '10px 14px';
            prevBtn.style.border = '1px solid rgba(255,255,255,0.1)';
            prevBtn.style.borderRadius = '8px';
            prevBtn.style.cursor = 'pointer';
            prevBtn.style.backgroundColor = '#232323';
            prevBtn.style.color = '#ffffff';
            prevBtn.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            prevBtn.style.position = 'relative';
            prevBtn.style.overflow = 'hidden';
            prevBtn.addEventListener('click', function() {
                currentCalendarDate.setMonth(currentCalendarDate.getMonth() - 1);
                generateCalendar(currentCalendarDate);
            });
            
            prevBtn.addEventListener('mouseenter', function() {
                this.style.backgroundColor = '#3498db';
                this.style.transform = 'scale(1.05)';
                this.style.boxShadow = '0 4px 12px rgba(52, 152, 219, 0.3)';
            });
            
            prevBtn.addEventListener('mouseleave', function() {
                this.style.backgroundColor = '#232323';
                this.style.transform = 'scale(1)';
                this.style.boxShadow = 'none';
            });
            
            const monthYear = document.createElement('h4');
            monthYear.textContent = `${date.getFullYear()}年${date.getMonth() + 1}月`;
            monthYear.style.margin = '0';
            monthYear.style.color = '#ffffff';
            monthYear.style.fontWeight = '600';
            
            const nextBtn = document.createElement('button');
            nextBtn.textContent = '›';
            nextBtn.style.padding = '10px 14px';
            nextBtn.style.border = '1px solid rgba(255,255,255,0.1)';
            nextBtn.style.borderRadius = '8px';
            nextBtn.style.cursor = 'pointer';
            nextBtn.style.backgroundColor = '#232323';
            nextBtn.style.color = '#ffffff';
            nextBtn.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            nextBtn.style.position = 'relative';
            nextBtn.style.overflow = 'hidden';
            nextBtn.addEventListener('click', function() {
                currentCalendarDate.setMonth(currentCalendarDate.getMonth() + 1);
                generateCalendar(currentCalendarDate);
            });
            
            nextBtn.addEventListener('mouseenter', function() {
                this.style.backgroundColor = '#3498db';
                this.style.transform = 'scale(1.05)';
                this.style.boxShadow = '0 4px 12px rgba(52, 152, 219, 0.3)';
            });
            
            nextBtn.addEventListener('mouseleave', function() {
                this.style.backgroundColor = '#232323';
                this.style.transform = 'scale(1)';
                this.style.boxShadow = 'none';
            });
            
            nav.appendChild(prevBtn);
            nav.appendChild(monthYear);
            nav.appendChild(nextBtn);
            calendar.appendChild(nav);
            
            // 星期标题
            const weekdays = ['一', '二', '三', '四', '五', '六', '日'];
            const weekRow = document.createElement('div');
            weekRow.style.display = 'grid';
            weekRow.style.gridTemplateColumns = 'repeat(7, 1fr)';
            weekRow.style.textAlign = 'center';
            weekRow.style.fontWeight = '600';
            weekRow.style.marginBottom = '10px';
            
            weekdays.forEach(day => {
                const dayEl = document.createElement('div');
                dayEl.textContent = day;
                dayEl.style.color = '#ffffff';
                dayEl.style.padding = '10px';
                dayEl.style.backgroundColor = '#232323';
                dayEl.style.borderRadius = '6px';
                dayEl.style.border = '1px solid rgba(255,255,255,0.1)';
                weekRow.appendChild(dayEl);
            });
            calendar.appendChild(weekRow);
            
            // 日期网格
            const daysGrid = document.createElement('div');
            daysGrid.style.display = 'grid';
            daysGrid.style.gridTemplateColumns = 'repeat(7, 1fr)';
            daysGrid.style.gridTemplateRows = 'repeat(6, 1fr)';
            daysGrid.style.gap = '4px';
            daysGrid.style.height = '220px';
            daysGrid.style.minHeight = '220px';
            daysGrid.style.width = '100%';
            daysGrid.style.boxSizing = 'border-box';
            
            // 计算月份的第一天是星期几（0-6，0是星期日）
            const firstDay = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            // 调整为以星期一为一周的开始
            const adjustedFirstDay = firstDay === 0 ? 6 : firstDay - 1;
            // 计算月份的天数
            const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            
            // 添加上个月的日期
            for (let i = 0; i < adjustedFirstDay; i++) {
                const dayEl = document.createElement('div');
                dayEl.style.display = 'flex';
                dayEl.style.alignItems = 'center';
                dayEl.style.justifyContent = 'center';
                dayEl.style.color = '#666';
                dayEl.style.border = '1px solid rgba(255,255,255,0.1)';
                dayEl.style.borderRadius = '6px';
                dayEl.style.aspectRatio = '1';
                dayEl.style.minHeight = '35px';
                dayEl.style.backgroundColor = '#1e1e1e';
                daysGrid.appendChild(dayEl);
            }
            
            // 添加当前月的日期
            for (let i = 1; i <= daysInMonth; i++) {
                const dayEl = document.createElement('div');
                dayEl.textContent = i;
                dayEl.style.display = 'flex';
                dayEl.style.alignItems = 'center';
                dayEl.style.justifyContent = 'center';
                dayEl.style.border = '1px solid rgba(255,255,255,0.1)';
                dayEl.style.borderRadius = '6px';
                dayEl.style.cursor = 'pointer';
                dayEl.style.aspectRatio = '1';
                dayEl.style.minHeight = '35px';
                dayEl.style.backgroundColor = '#232323';
                dayEl.style.color = '#ffffff';
                dayEl.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                dayEl.style.position = 'relative';
                
                // 高亮选中的日期
                if (i === selectedDate.getDate() && date.getMonth() === selectedDate.getMonth() && date.getFullYear() === selectedDate.getFullYear()) {
                    dayEl.style.backgroundColor = '#3498db';
                    dayEl.style.color = 'white';
                    dayEl.style.transform = 'scale(1.1)';
                    dayEl.style.boxShadow = '0 4px 12px rgba(52, 152, 219, 0.4)';
                }
                
                // 鼠标悬停效果
                dayEl.addEventListener('mouseenter', function() {
                    if (!(i === selectedDate.getDate() && date.getMonth() === selectedDate.getMonth() && date.getFullYear() === selectedDate.getFullYear())) {
                        this.style.backgroundColor = '#3498db';
                        this.style.transform = 'scale(1.1)';
                        this.style.boxShadow = '0 4px 12px rgba(52, 152, 219, 0.4)';
                    }
                });
                
                dayEl.addEventListener('mouseleave', function() {
                    if (!(i === selectedDate.getDate() && date.getMonth() === selectedDate.getMonth() && date.getFullYear() === selectedDate.getFullYear())) {
                        this.style.backgroundColor = '#232323';
                        this.style.transform = 'scale(1)';
                        this.style.boxShadow = 'none';
                    }
                });
                
                // 点击选择日期
                dayEl.addEventListener('click', function() {
                    selectedDate = new Date(date.getFullYear(), date.getMonth(), i);
                    generateCalendar(date);
                });
                
                daysGrid.appendChild(dayEl);
            }
            
            // 添加下个月的日期，确保日历始终是6行7列
            const totalDays = adjustedFirstDay + daysInMonth;
            const remainingDays = 42 - totalDays; // 6行7列 = 42个单元格
            for (let i = 1; i <= remainingDays; i++) {
                const dayEl = document.createElement('div');
                dayEl.style.display = 'flex';
                dayEl.style.alignItems = 'center';
                dayEl.style.justifyContent = 'center';
                dayEl.style.color = '#666';
                dayEl.style.border = '1px solid rgba(255,255,255,0.1)';
                dayEl.style.borderRadius = '6px';
                dayEl.style.aspectRatio = '1';
                dayEl.style.minHeight = '35px';
                dayEl.style.backgroundColor = '#1e1e1e';
                daysGrid.appendChild(dayEl);
            }
            
            calendar.appendChild(daysGrid);
        }
        
        // 点击日期显示日期选择器模态框
        addTouchEvent(document.getElementById('currentDateWeek'), function() {
            const modal = document.getElementById('dateModal');
            // 设置默认选中日期为当前导航日期
            selectedDate = new Date(currentDate);
            currentCalendarDate = new Date(currentDate);
            // 生成日历
            generateCalendar(currentCalendarDate);
            // 显示模态框
            modal.style.display = 'block';
        });
        
        // 关闭模态框
        addTouchEvent(document.getElementById('cancelDate'), function() {
            document.getElementById('dateModal').style.display = 'none';
        });
        
        // 确认选择日期
        addTouchEvent(document.getElementById('confirmDate'), function() {
            currentDate = selectedDate;
            updateDateDisplay();
            document.getElementById('dateModal').style.display = 'none';
        });
        
        // 点击模态框外部关闭
        function handleModalClose(event) {
            const dateModal = document.getElementById('dateModal');
            const weekModal = document.getElementById('weekModal');
            if (event.target === dateModal) {
                dateModal.style.display = 'none';
            }
            if (event.target === weekModal) {
                weekModal.style.display = 'none';
            }
        }
        
        window.addEventListener('click', handleModalClose);
        window.addEventListener('touchstart', handleModalClose);
        
        // 周数选择相关变量
        let selectedWeek = 1;
        
        // 生成周数选择器
        function generateWeekSelector() {
            const weekSelector = document.getElementById('weekSelector');
            weekSelector.innerHTML = '';
            
            // 生成1-18周的选择按钮
            const weeksGrid = document.createElement('div');
            weeksGrid.style.display = 'grid';
            weeksGrid.style.gridTemplateColumns = 'repeat(3, 1fr)';
            weeksGrid.style.gap = '8px';
            weeksGrid.style.width = '100%';
            weeksGrid.style.boxSizing = 'border-box';
            
            for (let i = 1; i <= 18; i++) {
                const weekBtn = document.createElement('button');
                weekBtn.textContent = `第${i}周`;
                weekBtn.style.padding = '10px 14px';
                weekBtn.style.border = '1px solid rgba(255,255,255,0.1)';
                weekBtn.style.borderRadius = '8px';
                weekBtn.style.cursor = 'pointer';
                weekBtn.style.minWidth = '80px';
                weekBtn.style.height = '40px';
                weekBtn.style.display = 'flex';
                weekBtn.style.alignItems = 'center';
                weekBtn.style.justifyContent = 'center';
                weekBtn.style.fontSize = '14px';
                weekBtn.style.backgroundColor = '#232323';
                weekBtn.style.color = '#ffffff';
                weekBtn.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                weekBtn.style.position = 'relative';
                weekBtn.style.overflow = 'hidden';
                
                // 高亮选中的周数
                if (i === selectedWeek) {
                    weekBtn.style.backgroundColor = '#3498db';
                    weekBtn.style.color = 'white';
                    weekBtn.style.transform = 'scale(1.05)';
                    weekBtn.style.boxShadow = '0 4px 12px rgba(52, 152, 219, 0.4)';
                }
                
                // 鼠标悬停效果
                weekBtn.addEventListener('mouseenter', function() {
                    if (i !== selectedWeek) {
                        this.style.backgroundColor = '#3498db';
                        this.style.transform = 'scale(1.05)';
                        this.style.boxShadow = '0 4px 12px rgba(52, 152, 219, 0.4)';
                    }
                });
                
                weekBtn.addEventListener('mouseleave', function() {
                    if (i !== selectedWeek) {
                        this.style.backgroundColor = '#232323';
                        this.style.transform = 'scale(1)';
                        this.style.boxShadow = 'none';
                    }
                });
                
                // 点击选择周数
                weekBtn.addEventListener('click', function() {
                    selectedWeek = i;
                    generateWeekSelector();
                });
                
                weeksGrid.appendChild(weekBtn);
            }
            
            weekSelector.appendChild(weeksGrid);
        }
        
        // 点击星期几显示周数选择器
        addTouchEvent(document.getElementById('weekday'), function() {
            const modal = document.getElementById('weekModal');
            // 设置默认选中周数为当前周
            selectedWeek = calculateWeekNumber(currentDate);
            // 生成周数选择器
            generateWeekSelector();
            // 显示模态框
            modal.style.display = 'block';
        });
        
        // 关闭周数选择器
        addTouchEvent(document.getElementById('cancelWeek'), function() {
            document.getElementById('weekModal').style.display = 'none';
        });
        
        // 确认选择周数
        addTouchEvent(document.getElementById('confirmWeek'), function() {
            // 计算第selectedWeek周的星期一日期
            // 学期开始日期是semesterStart（3月2日，星期一）
            const weeksDiff = selectedWeek - 1;
            const targetDate = new Date(semesterStart);
            targetDate.setDate(semesterStart.getDate() + weeksDiff * 7);
            
            currentDate = targetDate;
            updateDateDisplay();
            document.getElementById('weekModal').style.display = 'none';
        });
        
        // 初始化
        updateRealTime();
        updateDateDisplay();
        
        // 实时更新时间（只更新实时时间显示，不影响导航日期）
        setInterval(updateRealTime, 1000);
    </script>
</body>
</html>
